<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <title>Create Account - MetaPlay</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>


<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo"><a href="index.html">Meta<span>Play</span></a></div>
    <p class="auth-subtitle">Join the MetaPlay community</p>

    <h2 class="auth-title">Create Account</h2>

    <!-- Search: upload profile photo -->
    <div class="photo-upload">
      <div
        class="photo-preview"
        id="regPhotoPreview"
        title="Click to upload photo"
        style="font-size:2rem">+</div>
      <span class="photo-hint">Click to add profile photo (optional)</span>
    </div>
    <input type="file" id="regPhotoInput" accept="image/*" style="display:none">

    <div class="auth-error" id="registerError"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="auth-label" for="regUsername">Username</label>
        <input class="form-input" id="regUsername" type="text" placeholder="Choose a username" required autocomplete="username" minlength="3">
      </div>
      <div class="form-group">
        <label class="auth-label" for="regPassword">Password</label>
        <input class="form-input" id="regPassword" type="password" placeholder="At least 4 characters" required autocomplete="new-password" minlength="4">
      </div>
      <div class="form-group">
        <label class="auth-label" for="regConfirm">Confirm Password</label>
        <input class="form-input" id="regConfirm" type="password" placeholder="Repeat your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="submit-btn" id="registerSubmit" style="margin-top:8px">Create Account</button>
    </form>

    <p class="auth-link">
      Already have an account? <a href="login.html">Log in</a>
    </p>
    <p class="auth-link" style="margin-top:8px">
      <a href="index.html" style="color:var(--muted)">← Back to MetaPlay</a>
    </p>

  </div>
</div>

<script type="module" src="js/pages/register.js"></script>
</body>
</html>
