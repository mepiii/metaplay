<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <title>Log In - MetaPlay</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>


<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo"><a href="index.html">Meta<span>Play</span></a></div>
    <p class="auth-subtitle">Welcome back, gamer</p>

    <h2 class="auth-title">Log In</h2>

    <div class="auth-error" id="loginError"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="auth-label" for="loginUsername">Username</label>
        <input class="form-input" id="loginUsername" type="text" placeholder="Your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="auth-label" for="loginPassword">Password</label>
        <input class="form-input" id="loginPassword" type="password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn" id="loginSubmit">Log In</button>
    </form>

    <p class="auth-link">
      Don't have an account? <a href="register.html">Create one</a>
    </p>
    <p class="auth-link compact">
      <a class="auth-back-link" href="index.html">← Back to MetaPlay</a>
    </p>

  </div>
</div>

<script type="module" src="js/pages/login.js"></script>
</body>
</html>
