<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <title>Search - MetaPlay</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages/search.css">
</head>
<body>

<button id="back-to-top" aria-label="Back to top">↑</button>

<header class="navbar">
  <a class="nav-logo" href="index.html">Meta<span>Play</span></a>
  <nav class="nav-links">
    <a href="index.html" class="nav-link">Discover</a>
    <a href="games.html" class="nav-link">All Games</a>
    <div class="platform-menu">
      <span class="platform-trigger">Platforms ▾</span>
      <div class="platform-dropdown">
        <a href="games.html?platform=PC"            class="platform-item">PC</a>
        <a href="games.html?platform=PS5"           class="platform-item">PlayStation 5</a>
        <a href="games.html?platform=PS4"           class="platform-item">PlayStation 4</a>
        <a href="games.html?platform=Xbox Series X/S" class="platform-item">Xbox Series X/S</a>
        <a href="games.html?platform=Xbox One"      class="platform-item">Xbox One</a>
        <a href="games.html?platform=Switch"        class="platform-item">Switch</a>
        <div class="platform-divider"></div>
        <a href="games.html" class="platform-item">All Platforms</a>
      </div>
    </div>
    <a href="about.html" class="nav-link">About</a>
  </nav>
  <div class="nav-right">
    <span class="live-time" id="liveTime">--:--</span>
    <button class="icon-btn" id="themeToggle">☾</button>
    <a href="login.html" class="nav-login-link" id="navLoginLink">Log In</a>
    <a href="profile.html" class="nav-profile" id="navProfile" style="display:none">
      <div class="nav-avatar" id="navAvatarImg"></div>
      <span class="nav-username" id="navUsernameText"></span>
    </a>
    <button class="wishlist-btn" id="wishlistBtn">
      ♡ Wishlist <span class="wishlist-count" id="wishlistCount">0</span>
    </button>
    <div class="search-wrap">
      <input class="search-input" id="searchField" type="text" placeholder="Search games…" autocomplete="off">
      <div class="search-suggestions" id="suggestionsBox"></div>
    </div>
  </div>
</header>

<!-- Search: search page header -->
<div class="search-header">
  <h1 class="search-title">
    Results for <span class="search-query" id="searchQuery"></span>
    <span class="result-count" id="resultCount"></span>
  </h1>
</div>

<!-- Search: search filters -->
<div class="search-filters-wrap">
  <div class="filter-bar">
    <span class="filter-label">Platform:</span>
    <button class="tab active" data-platform="All">All</button>
    <button class="tab" data-platform="PC">PC</button>
    <button class="tab" data-platform="PS5">PS5</button>
    <button class="tab" data-platform="PS4">PS4</button>
    <button class="tab" data-platform="Xbox Series X/S">Xbox X/S</button>
    <button class="tab" data-platform="Switch">Switch</button>
  </div>
  <div class="filter-controls">
    <select class="filter-select" id="searchGenre">
      <option value="All">All Genres</option>
      <option value="RPG">RPG</option>
      <option value="Action">Action</option>
      <option value="Adventure">Adventure</option>
      <option value="Platformer">Platformer</option>
      <option value="Roguelike">Roguelike</option>
      <option value="Shooter">Shooter</option>
      <option value="Strategy">Strategy</option>
      <option value="Horror">Horror</option>
      <option value="Simulation">Simulation</option>
      <option value="MOBA">MOBA</option>
    </select>
    <select class="filter-select" id="searchSort">
      <option value="rating">Highest Rated</option>
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="alpha">A–Z</option>
    </select>
    <div class="filter-info">
      <span class="search-filter-count" id="activeFilterCount"></span>
    </div>
  </div>
</div>

<div class="game-grid game-grid-padded" id="searchResultsContainer"></div>

<footer class="footer" style="margin-top:40px">
  <a class="nav-logo" href="index.html">Meta<span>Play</span></a>
  <div class="footer-links">
    <a href="index.html">Discover</a>
    <a href="games.html">All Games</a>
    <a href="about.html">About</a>
  </div>
  <span class="footer-copy">© 2026 MetaPlay. All rights reserved.</span>
</footer>

<script type="module" src="js/pages/search.js"></script>
</body>
</html>
